<!DOCTYPE html>
<html lang="en">
<head>
    <title>The Vault</title>
    <style>
        body { 
            font-family: 'Comic Sans MS', 'Segoe UI', sans-serif; 
            background-color: #FFD1DC; 
            color: #4A2E15; 
            text-align: center; 
            padding: 30px; 
            background-image: radial-gradient(#FFB6C1 15%, transparent 16%);
            background-size: 30px 30px;
        }
        .box { 
            background: #FFF5F7; 
            border: 5px solid #8B4513; 
            border-radius: 30px; 
            padding: 30px; 
            max-width: 500px; 
            margin: 15px auto; 
            box-shadow: 0 10px 0 #FF9EBB; 
        }
        h1, h2 { color: #D2691E; text-shadow: 2px 2px 0 #FFE4E1; }
        input { 
            padding: 12px; 
            width: 80%; 
            margin-top: 10px; 
            border: 3px solid #8B4513; 
            border-radius: 15px; 
            outline: none;
            font-weight: bold;
        }
        button { 
            background: #FF69B4; 
            color: white; 
            border: 3px solid #8B4513; 
            border-radius: 20px; 
            cursor: pointer; 
            font-weight: bold; 
            padding: 12px 20px; 
            margin-top: 15px;
            box-shadow: 0 5px 0 #8B4513; 
            transition: all 0.1s;
        }
        button:active {
            transform: translateY(5px);
            box-shadow: 0 0 0 #8B4513;
        }
        img, video { 
            max-width: 100%; 
            margin-top: 15px; 
            border-radius: 15px; 
            border: 4px solid #8B4513; 
        }
    </style>
</head>
<body>
    <h1>🍬 The Content Vault 🍬</h1>

    <div id="loginSection" class="box">
        <p><strong>Enter your CashApp handle to unwrap your treats!</strong></p>
        <input type="text" id="handleInput" placeholder="$YourCashAppHandle">
        <button onclick="unlockVault()">Unlock Vault</button>
        <p id="errorMsg" style="color: #FF1493; font-weight: bold; margin-top:10px;"></p>
    </div>

    <div id="contentSection" style="display: none;">
        <h2 style="color: #FF1493;">🍭 Access Granted! 🍭</h2>
        <div id="mediaContainer"></div>
    </div>

    <script>
        function unlockVault() {
            const handle = document.getElementById('handleInput').value;
            
            fetch('/vault/access', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ handle: handle })
            })
            .then(res => res.json())
            .then(data => {
                if (data.error) {
                    document.getElementById('errorMsg').innerText = "🍫 " + data.error + " 🍫";
                } else {
                    document.getElementById('loginSection').style.display = 'none';
                    document.getElementById('contentSection').style.display = 'block';
                    
                    const container = document.getElementById('mediaContainer');
                    data.forEach(item => {
                        const ext = item.filename.split('.').pop().toLowerCase();
                        const isVideo = ['mp4', 'webm', 'mov'].includes(ext);
                        const mediaUrl = `/protected-media/${item.filename}?handle=${encodeURIComponent(handle)}`;
                        
                        let mediaHtml = isVideo ? `<video controls><source src="${mediaUrl}"></video>` : `<img src="${mediaUrl}">`;

                        container.innerHTML += `
                            <div class="box">
                                <h3>🎀 ${item.title} 🎀</h3>
                                ${mediaHtml}
                            </div>
                        `;
                    });
                }
            });
        }
    </script>
</body>
</html>
