<!DOCTYPE html>
<html lang="en">
<head>
    <title>Private Event Access</title>
    <style>
        body { 
            font-family: 'Comic Sans MS', 'Segoe UI', sans-serif; 
            background-color: #FFD1DC; /* Pastel Pink */
            color: #4A2E15; /* Chocolate Brown */
            text-align: center; 
            padding: 30px; 
            background-image: radial-gradient(#FFB6C1 15%, transparent 16%);
            background-size: 30px 30px;
        }
        .paywall { 
            background: #FFF5F7; 
            border: 5px solid #8B4513; /* Saddle Brown */
            border-radius: 30px; 
            padding: 30px; 
            max-width: 400px; 
            margin: 0 auto; 
            box-shadow: 0 10px 0 #FF9EBB; /* Candy 3D Shadow */
        }
        h2, h3 { color: #D2691E; /* Chocolate */ margin-top: 0; }
        input { 
            padding: 12px; 
            margin: 10px 0; 
            width: 85%; 
            border: 3px solid #8B4513; 
            border-radius: 15px; 
            background: #FFF; 
            color: #4A2E15;
            font-weight: bold;
            outline: none;
        }
        button, .vault-link { 
            background: #FF69B4; /* Hot Pink */
            color: white; 
            border: 3px solid #8B4513; 
            border-radius: 20px; 
            cursor: pointer; 
            font-size: 16px; 
            font-weight: bold; 
            padding: 12px 20px; 
            width: 90%;
            box-shadow: 0 5px 0 #8B4513; 
            transition: all 0.1s;
            display: inline-block;
            text-decoration: none;
            margin-top: 10px;
        }
        button:active, .vault-link:active {
            transform: translateY(5px);
            box-shadow: 0 0 0 #8B4513;
        }
        .qr-box {
            width: 150px; 
            height: 150px; 
            background: #8B4513; 
            color: #FFD1DC; 
            margin: 20px auto; 
            line-height: 150px;
            border-radius: 20px;
            border: 4px dashed #FF69B4;
            font-weight: bold;
        }
        #refCode { color: #FF1493; background: #FFE4E1; padding: 2px 8px; border-radius: 10px; border: 2px solid #FF1493;}
    </style>
</head>
<body>
    <div class="paywall">
        <h2>💖 Unlock the Magic 💖</h2>
        <p>Send an honorarium via CashApp to <strong>$YourName</strong></p>
        <p>Put this code in the payment note:<br> <strong id="refCode"></strong></p>
        
        <div class="qr-box">[QR CODE HERE]</div>

        <h3>Already Paid?</h3>
        <input type="text" id="handle" placeholder="Enter CashApp Handle (e.g. $JohnDoe)">
        <button onclick="submitClaim()">I Sent The Payment!</button>
        <p id="message" style="font-weight: bold; color: #FF1493;"></p>
        
        <br>
        <a href="/vault.html" class="vault-link">🍫 Go To The Vault 🍫</a>
    </div>

    <script>
        const randomCode = "#EVNT-" + Math.floor(1000 + Math.random() * 9000);
        document.getElementById('refCode').innerText = randomCode;

        function submitClaim() {
            const handle = document.getElementById('handle').value;
            fetch('/claim', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ handle: handle, refCode: randomCode })
            })
            .then(res => res.text())
            .then(data => document.getElementById('message').innerText = "🎀 " + data + " 🎀");
        }
    </script>
</body>
</html>
