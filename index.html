<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BRatYAs Dashboard</title>
    <!-- This script pulls in Tailwind CSS magically so we can style easily -->
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="flex h-screen bg-gray-50 font-sans">

    <!-- Sidebar (Burgundy Theme) -->
    <aside class="w-64 bg-[#8C1C40] text-white flex flex-col shadow-xl relative overflow-hidden">
        <!-- We will add the actual candy background image here later! -->
        <div class="p-6 text-3xl font-bold border-b border-white/10 z-10">
            🍭 BRatYAs
        </div>
        <nav class="flex-1 p-4 space-y-2 z-10 text-sm font-medium">
            <a href="#" class="block px-4 py-3 bg-white/20 rounded-lg shadow-sm">🏠 Dashboard</a>
            <a href="#" class="block px-4 py-3 hover:bg-white/10 rounded-lg transition-colors">📅 Events</a>
            <a href="#" class="block px-4 py-3 hover:bg-white/10 rounded-lg transition-colors">🔒 Private Content</a>
            <a href="#" class="block px-4 py-3 hover:bg-white/10 rounded-lg transition-colors">📂 Media Vault</a>
        </nav>
    </aside>

    <!-- Main Content Area -->
    <main class="flex-1 p-8 overflow-y-auto">
        
        <!-- Top Nav -->
        <header class="flex justify-end items-center mb-10 space-x-4">
            <a href="#" class="text-gray-600 font-medium hover:text-black">Events</a>
            <button class="bg-[#E4B37D] text-black px-6 py-2 rounded-full font-bold shadow-sm hover:bg-[#d6a56e] transition-colors">Dashboard</button>
        </header>

        <!-- Events Section -->
        <h1 class="text-3xl font-bold mb-6 text-gray-900">Upcoming Events</h1>
        
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <!-- Event Card 1 -->
            <div class="bg-white p-4 rounded-2xl shadow-sm border border-gray-100">
                <!-- Temporary placeholder image for the event -->
                <div class="h-48 bg-gray-200 rounded-xl mb-4 bg-cover bg-center" style="background-image: url('https://images.unsplash.com/photo-1514362545857-3bc16c4c7d1b?auto=format&fit=crop&q=80&w=400');"></div>
                <h3 class="font-bold text-xl text-gray-900">Exclusive Dining</h3>
                <p class="text-gray-500 text-sm mb-4 mt-1">Event Jan 1 • 00:00 AM - 2:00 PM</p>
                <button class="w-full bg-[#8C1C40] text-white py-3 rounded-lg font-medium hover:bg-[#6e1532] transition-colors">Booking</button>
            </div>
            
            <!-- You can copy and paste that card block to make more! -->
        </div>

    </main>
</body>
</html>
