<!DOCTYPE html>
<html lang="en">
<head>
    <title>Admin Dashboard</title>
    <style>
        body { 
            font-family: 'Comic Sans MS', 'Segoe UI', sans-serif; 
            background-color: #5C4033; /* Dark Chocolate */
            color: #FFF0F5; 
            padding: 20px; 
            background-image: radial-gradient(#4A2E15 15%, transparent 16%);
            background-size: 30px 30px;
        }
        h1, h2 { color: #FFB6C1; text-align: center; text-shadow: 2px 2px 0 #4A2E15;}
        .panel { 
            background: #FFD1DC; 
            border: 5px solid #FF69B4; 
            border-radius: 25px; 
            padding: 20px; 
            margin: 20px auto; 
            max-width: 600px;
            color: #4A2E15;
            box-shadow: 0 8px 0 #FF69B4;
        }
        button { 
            background: #8B4513; 
            color: white; 
            border: 3px solid #4A2E15; 
            padding: 10px 15px; 
            cursor: pointer; 
            border-radius: 15px;
            font-weight: bold;
            box-shadow: 0 4px 0 #4A2E15;
            transition: all 0.1s;
        }
        button:active {
            transform: translateY(4px);
            box-shadow: 0 0 0 #4A2E15;
        }
        input { 
            padding: 10px; 
            margin-bottom: 10px; 
            width: 90%; 
            border: 3px solid #8B4513;
            border-radius: 10px;
        }
        .claim-card {
            border-bottom: 3px dashed #FF69B4; 
            padding-bottom: 15px; 
            margin-bottom: 15px;
        }
    </style>
</head>
<body>
    <h1>👑 Admin Candy Castle 👑</h1>

    <div class="panel">
        <h2>1. Upload Content to Vault</h2>
        <form action="/admin/upload" method="POST" enctype="multipart/form-data">
            <input type="text" name="title" placeholder="Title of Video/Image" required>
            <input type="file" name="mediaFile" required style="background: #FFF;">
            <button type="submit" style="background: #FF1493; border-color: #C71585; box-shadow: 0 4px 0 #C71585;">Upload Media</button>
        </form>
    </div>

    <div class="panel">
        <h2>2. Approve Payments</h2>
        <div id="claimsList">Loading...</div>
    </div>

    <script>
        function loadClaims() {
            fetch('/admin/claims').then(res => res.json()).then(claims => {
                const list = document.getElementById('claimsList');
                list.innerHTML = claims.length === 0 ? "<p style='text-align:center; font-weight:bold;'>No pending payments. 🍭</p>" : "";
                claims.forEach(claim => {
                    list.innerHTML += `
                        <div class="claim-card">
                            <p><strong>Handle:</strong> ${claim.handle}</p>
                            <p><strong>Code:</strong> <span style="background: #FFF; padding: 2px 5px; border-radius: 5px; color: #FF1493; font-weight:bold;">${claim.refCode}</span></p>
                            <button onclick="approveClaim(${claim.id})">Approve User</button>
                        </div>`;
                });
            });
        }

        function approveClaim(id) {
            fetch('/admin/approve', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ id }) })
            .then(() => { alert("Approved! 🎀"); loadClaims(); });
        }
        loadClaims();
    </script>
</body>
</html>
